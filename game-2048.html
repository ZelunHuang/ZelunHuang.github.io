<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2048 - Zelun Huang</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .game-wrapper {
        max-width: 420px;
        margin: 0 auto;
        user-select: none;
        -webkit-user-select: none;
      }

      .game-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .score-box {
        font-size: 0.88rem;
        color: var(--muted);
      }

      .score-box strong {
        color: var(--text);
        font-size: 1.1rem;
      }

      .btn-new {
        font-family: var(--font);
        font-size: 0.85rem;
        padding: 6px 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface-alt);
        color: var(--text);
        cursor: pointer;
      }

      .btn-new:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .grid-container {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        background: #ebede9;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 6px;
      }

      .cell {
        background: rgba(255, 255, 255, 0.6);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.4rem;
        transition: background 0.12s;
        aspect-ratio: 1 / 1;
      }

      .tile-2    { background: #eee8d5; color: #586e75; }
      .tile-4    { background: #fcebb8; color: #586e75; }
      .tile-8    { background: #f5b342; color: #fff; }
      .tile-16   { background: #e8912e; color: #fff; }
      .tile-32   { background: #d97a26; color: #fff; }
      .tile-64   { background: #c9641e; color: #fff; }
      .tile-128  { background: #2da44e; color: #fff; font-size: 1.1rem; }
      .tile-256  { background: #218b3a; color: #fff; font-size: 1.1rem; }
      .tile-512  { background: #1a7f37; color: #fff; font-size: 1.1rem; }
      .tile-1024 { background: #146329; color: #fff; font-size: 0.9rem; }
      .tile-2048 { background: #0d4f1f; color: #fff; font-size: 0.9rem; }

      .game-overlay {
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.75);
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        border-radius: var(--radius);
        z-index: 5;
      }

      .game-overlay.show {
        display: flex;
      }

      .game-overlay p {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text);
      }

      .game-overlay .btn-new {
        font-size: 0.95rem;
        padding: 10px 28px;
      }

      .hint {
        margin-top: 14px;
        font-size: 0.82rem;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">Zelun Huang</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <div class="dropdown">
            <span class="dropbtn">More ▾</span>
            <div class="dropdown-menu">
              <a href="profile.html">Profile</a>
              <a href="projects.html">Projects</a>
              <a href="hobbies.html">Hobbies</a>
              <a href="https://github.com/ZelunHuang" target="_blank" rel="noreferrer">GitHub</a>
              <a href="social.html">Social Media</a>
              <a class="active" href="fun-game.html">Fun Game</a>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main class="page-shell">
      <section class="container">
        <div class="page-heading">
          <h1>2048</h1>
          <p>Join the tiles, get to <strong>2048</strong>!</p>
        </div>

        <div class="game-wrapper">
          <div class="game-header">
            <div class="score-box">
              Score: <strong id="score">0</strong>
            </div>
            <button class="btn-new" id="btn-new">New Game</button>
          </div>

          <div class="grid-container" id="grid">
            <div class="game-overlay" id="overlay">
              <p id="overlay-msg">You win!</p>
              <button class="btn-new" id="btn-restart">Play again</button>
            </div>
          </div>

          <p class="hint">Use <strong>arrow keys</strong> or <strong>swipe</strong> to move tiles.</p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Zelun Huang</p>
      </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
      (function () {
        const SIZE = 4;
        let grid = [];
        let score = 0;

        const gridEl = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const overlayMsg = document.getElementById('overlay-msg');

        function emptyGrid() {
          return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
        }

        function clone(g) {
          return g.map(row => [...row]);
        }

        function randomCell(g) {
          const empty = [];
          for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
              if (g[r][c] === 0) empty.push([r, c]);
          if (empty.length === 0) return;
          const [r, c] = empty[Math.floor(Math.random() * empty.length)];
          g[r][c] = Math.random() < 0.9 ? 2 : 4;
        }

        function slideRow(row) {
          // remove zeros
          let arr = row.filter(v => v !== 0);
          let merged = [];
          let sc = 0;
          for (let i = 0; i < arr.length; i++) {
            if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
              merged.push(arr[i] * 2);
              sc += arr[i] * 2;
              i++;
            } else {
              merged.push(arr[i]);
            }
          }
          while (merged.length < SIZE) merged.push(0);
          return { row: merged, score: sc };
        }

        function slideGrid(g, dir) {
          // dir: 0=left, 1=up, 2=right, 3=down
          let newGrid = emptyGrid();
          let totalSc = 0;
          for (let i = 0; i < SIZE; i++) {
            let src;
            if (dir === 0) src = g[i];
            else if (dir === 1) src = g.map(row => row[i]);
            else if (dir === 2) src = [...g[i]].reverse();
            else src = g.map(row => row[i]).reverse();

            let { row: slid, score: sc } = slideRow(src);
            totalSc += sc;

            if (dir === 2) slid.reverse();
            if (dir === 3) slid.reverse();

            for (let j = 0; j < SIZE; j++) {
              if (dir === 0) newGrid[i][j] = slid[j];
              else if (dir === 1) newGrid[j][i] = slid[j];
              else if (dir === 2) newGrid[i][j] = slid[j];
              else newGrid[j][i] = slid[j];
            }
          }
          return { grid: newGrid, score: totalSc };
        }

        function equalGrid(a, b) {
          for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
              if (a[r][c] !== b[r][c]) return false;
          return true;
        }

        function hasEmpty(g) {
          for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
              if (g[r][c] === 0) return true;
          return false;
        }

        function canMerge(g) {
          for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++) {
              if (c + 1 < SIZE && g[r][c] === g[r][c + 1]) return true;
              if (r + 1 < SIZE && g[r][c] === g[r + 1][c]) return true;
            }
          return false;
        }

        function move(dir) {
          const before = clone(grid);
          const { grid: after, score: sc } = slideGrid(grid, dir);
          if (equalGrid(before, after)) return;
          grid = after;
          score += sc;
          scoreEl.textContent = score;
          randomCell(grid);
          render();

          // check win
          for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
              if (grid[r][c] === 2048) {
                showOverlay('You win!');
                return;
              }

          // check lose
          if (!hasEmpty(grid) && !canMerge(grid)) {
            showOverlay('Game over!');
          }
        }

        function showOverlay(msg) {
          overlayMsg.textContent = msg;
          overlay.classList.add('show');
        }

        function render() {
          const cells = gridEl.querySelectorAll('.cell');
          cells.forEach((el, i) => {
            const r = Math.floor(i / SIZE);
            const c = i % SIZE;
            const v = grid[r][c];
            el.textContent = v || '';
            el.className = 'cell' + (v ? ' tile-' + v : '');
          });
        }

        function newGame() {
          overlay.classList.remove('show');
          grid = emptyGrid();
          score = 0;
          scoreEl.textContent = '0';
          randomCell(grid);
          randomCell(grid);
          render();
        }

        // Build cell elements
        for (let i = 0; i < SIZE * SIZE; i++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          gridEl.appendChild(cell);
        }

        // Keyboard
        document.addEventListener('keydown', (e) => {
          const dirs = { ArrowLeft: 0, ArrowUp: 1, ArrowRight: 2, ArrowDown: 3 };
          if (e.key in dirs) { e.preventDefault(); move(dirs[e.key]); }
        });

        // Touch swipe
        let touchStart = null;
        gridEl.addEventListener('touchstart', (e) => {
          const t = e.touches[0];
          touchStart = { x: t.clientX, y: t.clientY };
        }, { passive: true });

        gridEl.addEventListener('touchend', (e) => {
          if (!touchStart) return;
          const t = e.changedTouches[0];
          const dx = t.clientX - touchStart.x;
          const dy = t.clientY - touchStart.y;
          const absX = Math.abs(dx), absY = Math.abs(dy);
          if (Math.max(absX, absY) < 30) return;
          if (absX > absY) move(dx > 0 ? 2 : 0);
          else move(dy > 0 ? 3 : 1);
          touchStart = null;
        }, { passive: true });

        document.getElementById('btn-new').addEventListener('click', newGame);
        document.getElementById('btn-restart').addEventListener('click', newGame);

        newGame();
      })();
    </script>
  </body>
</html>
