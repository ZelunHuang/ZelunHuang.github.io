<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pong - Zelun Huang</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .pong-wrapper { max-width: 500px; margin: 0 auto; user-select: none; -webkit-user-select: none; }
      .pong-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
      .pong-info { display:flex; gap:20px; font-size:0.85rem; color:var(--muted); }
      .pong-info strong { color:var(--text); font-size:1rem; }
      .btn-sm { font-family:var(--font); font-size:0.82rem; padding:3px 12px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface-alt); color:var(--text); cursor:pointer; }
      .btn-sm:hover { border-color:var(--accent); color:var(--accent); }
      .btn-lg { font-family:var(--font); font-size:0.95rem; padding:10px 24px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface-alt); color:var(--text); cursor:pointer; }
      .btn-lg:hover { border-color:var(--accent); color:var(--accent); }
      #canvas { display:block; width:100%; aspect-ratio:3/4; border:1px solid var(--border); border-radius:var(--radius); background:#ebede9; }
      .pong-bottom { margin-top:10px; }
      .pong-actions { display:flex; align-items:center; gap:14px; }
      .speed-group { display:flex; align-items:center; gap:6px; }
      .speed-label { font-size:0.82rem; color:var(--muted); min-width:82px; text-align:center; }
      .controls-hint { margin-top:10px; font-size:0.82rem; color:var(--muted); line-height:1.6; }
      .controls-hint kbd { font-family:var(--font); padding:1px 6px; border:1px solid var(--border); border-radius:3px; font-size:0.78rem; background:var(--surface-alt); }
      .overlay { position:absolute; inset:0; background:rgba(255,255,255,0.78); display:none; align-items:center; justify-content:center; flex-direction:column; gap:10px; border-radius:var(--radius); z-index:5; }
      .overlay.show { display:flex; }
      .overlay p { margin:0; font-size:1.1rem; font-weight:700; color:var(--text); }
      .canvas-wrap { position:relative; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">Zelun Huang</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <div class="dropdown">
            <span class="dropbtn">More ▾</span>
            <div class="dropdown-menu">
              <a href="profile.html">Profile</a>
              <a href="projects.html">Projects</a>
              <a href="hobbies.html">Hobbies</a>
              <a href="https://github.com/ZelunHuang" target="_blank" rel="noreferrer">GitHub</a>
              <a href="social.html">Social Media</a>
              <a class="active" href="fun-game.html">Fun Game</a>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main class="page-shell">
      <section class="container">
        <div class="page-heading">
          <h1>Pong</h1>
          <p>Keep the ball alive. Bounces = score.</p>
        </div>

        <div class="pong-wrapper">
          <div class="pong-top">
            <div class="pong-info">
              <span>Score: <strong id="score">0</strong></span>
              <span>Best: <strong id="best">0</strong></span>
            </div>
            <button class="btn-sm" id="btn-new">New Game</button>
          </div>

          <div class="canvas-wrap">
            <canvas id="canvas"></canvas>
            <div class="overlay" id="overlay">
              <p id="overlay-msg">Game Over</p>
              <button class="btn-lg" id="btn-restart">Play again</button>
            </div>
          </div>

          <div class="pong-bottom">
            <div class="pong-actions">
              <button class="btn-sm" id="btn-pause">Pause</button>
              <div class="speed-group">
                <button class="btn-sm" id="btn-speed-down">&minus;</button>
                <span class="speed-label" id="speed-label">Speed: 3</span>
                <button class="btn-sm" id="btn-speed-up">+</button>
              </div>
            </div>
            <div class="controls-hint">
              <kbd>&larr;</kbd> <kbd>&rarr;</kbd> move paddle &nbsp;&middot;&nbsp; <kbd>P</kbd> pause &nbsp;&middot;&nbsp; drag paddle
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Zelun Huang</p>
      </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
      (function () {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const overlay = document.getElementById('overlay');
        const overlayMsg = document.getElementById('overlay-msg');

        let W, H, scale;
        const BALL_R = 6, PAD_W = 52, PAD_H = 10, MARGIN = 12;
        let ball, pad, score, best, gameOver, paused, animId;
        const SPEEDS = [1, 2, 3, 4, 5];
        let speedIdx = 2; // default speed 3

        function resize() {
          const rect = canvas.parentElement.getBoundingClientRect();
          const w = rect.width - 2; // account for border
          canvas.width = Math.round(w * 2); // 2x for retina
          canvas.height = Math.round(w * 1.5 * 2);
          canvas.style.width = w + 'px';
          canvas.style.height = Math.round(w * 1.5) + 'px';
          W = canvas.width;
          H = canvas.height;
          scale = W / 300; // logical width = 300 units
        }

        function resetBall() {
          ball = { x: W / 2, y: H / 3, r: BALL_R * scale, vx: 0, vy: 0 };
          const angle = (Math.random() * 0.8 + 0.2) * Math.PI; // mostly downward
          const speed = 3 * scale;
          ball.vx = Math.cos(angle) * speed * (Math.random() > 0.5 ? 1 : -1);
          ball.vy = Math.sin(angle) * speed;
        }

        function newGame() {
          overlay.classList.remove('show');
          resize();
          score = 0; gameOver = false; paused = false;
          scoreEl.textContent = '0';
          document.getElementById('btn-pause').textContent = 'Pause';
          const pw = PAD_W * scale, ph = PAD_H * scale;
          pad = { x: (W - pw) / 2, y: H - MARGIN * scale - ph, w: pw, h: ph };
          resetBall();
          cancelAnimationFrame(animId);
          loop();
          loadBest();
        }

        // best score from localStorage
        function loadBest() {
          best = parseInt(localStorage.getItem('pong-best') || '0');
          bestEl.textContent = best;
        }
        function saveBest() {
          if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('pong-best', best); }
        }

        function update() {
          if (paused || gameOver) return;
          const spd = SPEEDS[speedIdx];
          ball.x += ball.vx * spd / 3;
          ball.y += ball.vy * spd / 3;

          // wall bounces (left, right, top)
          if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = -ball.vx; score++; }
          if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -ball.vx; score++; }
          if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = -ball.vy; score++; }
          scoreEl.textContent = score;

          // paddle collision
          if (ball.vy > 0 && ball.y + ball.r >= pad.y && ball.y + ball.r <= pad.y + pad.h + 4 * scale &&
              ball.x >= pad.x - ball.r && ball.x <= pad.x + pad.w + ball.r) {
            ball.y = pad.y - ball.r;
            // deflect based on where ball hits the paddle
            const hit = (ball.x - pad.x) / pad.w; // 0..1
            const angle = hit * Math.PI * 0.6 + Math.PI * 0.2; // 36..144 deg
            const speed = 3 * scale;
            ball.vx = Math.cos(angle) * speed;
            ball.vy = -Math.sin(angle) * speed;
          }

          // below paddle → game over
          if (ball.y - ball.r > H) {
            gameOver = true;
            saveBest();
            overlayMsg.textContent = 'Game Over &middot; Score: ' + score;
            overlay.innerHTML = '<p>Game Over &middot; Score: ' + score + '</p><button class="btn-lg" id="btn-restart-o">Play again</button>';
            overlay.classList.add('show');
            document.getElementById('btn-restart-o').addEventListener('click', newGame);
            cancelAnimationFrame(animId);
          }
        }

        function draw() {
          ctx.clearRect(0, 0, W, H);

          // ball
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
          ctx.fillStyle = '#2da44e';
          ctx.fill();

          // paddle
          ctx.fillStyle = '#24292f';
          ctx.beginPath();
          ctx.roundRect(pad.x, pad.y, pad.w, pad.h, 3 * scale);
          ctx.fill();

          // top wall highlight
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(W, 0);
          ctx.strokeStyle = 'rgba(45,164,78,0.3)';
          ctx.lineWidth = 2 * scale;
          ctx.stroke();
        }

        function loop() {
          update();
          draw();
          animId = requestAnimationFrame(loop);
        }

        // Paddle controls: keyboard
        document.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowLeft') { e.preventDefault(); movePad(-1); }
          if (e.key === 'ArrowRight') { e.preventDefault(); movePad(1); }
          if (e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); }
        });

        let keys = {};
        document.addEventListener('keydown', (e) => { keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });

        function movePad(dir) {
          if (gameOver || paused) return;
          const step = 8 * scale;
          pad.x = Math.max(0, Math.min(W - pad.w, pad.x + dir * step));
        }

        // Continuous keyboard movement via interval
        setInterval(() => {
          if (gameOver || paused) return;
          let dx = 0;
          if (keys['ArrowLeft']) dx -= 1;
          if (keys['ArrowRight']) dx += 1;
          if (dx) { const step = 8 * scale; pad.x = Math.max(0, Math.min(W - pad.w, pad.x + dx * step)); }
        }, 16);

        // Mouse / touch drag on paddle
        let dragging = false, dragOffX = 0;
        canvas.addEventListener('mousedown', (e) => {
          const r = canvas.getBoundingClientRect();
          const mx = (e.clientX - r.left) * (canvas.width / r.width);
          if (mx >= pad.x && mx <= pad.x + pad.w) { dragging = true; dragOffX = mx - pad.x; }
        });
        window.addEventListener('mousemove', (e) => {
          if (!dragging || gameOver || paused) return;
          const r = canvas.getBoundingClientRect();
          const mx = (e.clientX - r.left) * (canvas.width / r.width) - dragOffX;
          pad.x = Math.max(0, Math.min(W - pad.w, mx));
        });
        window.addEventListener('mouseup', () => { dragging = false; });

        canvas.addEventListener('touchstart', (e) => {
          const t = e.touches[0];
          const r = canvas.getBoundingClientRect();
          const mx = (t.clientX - r.left) * (canvas.width / r.width);
          if (mx >= pad.x && mx <= pad.x + pad.w) { dragging = true; dragOffX = mx - pad.x; }
        }, { passive: true });
        canvas.addEventListener('touchmove', (e) => {
          if (!dragging || gameOver || paused) return;
          e.preventDefault();
          const t = e.touches[0];
          const r = canvas.getBoundingClientRect();
          const mx = (t.clientX - r.left) * (canvas.width / r.width) - dragOffX;
          pad.x = Math.max(0, Math.min(W - pad.w, mx));
        }, { passive: false });
        canvas.addEventListener('touchend', () => { dragging = false; });

        // Pause
        function togglePause() {
          if (gameOver) return;
          paused = !paused;
          document.getElementById('btn-pause').textContent = paused ? 'Resume' : 'Pause';
        }

        // Speed
        function adjustSpeed(delta) {
          speedIdx = Math.max(0, Math.min(SPEEDS.length - 1, speedIdx + delta));
          document.getElementById('speed-label').textContent = 'Speed: ' + SPEEDS[speedIdx];
        }

        // Wire buttons
        document.getElementById('btn-new').addEventListener('click', newGame);
        document.getElementById('btn-restart').addEventListener('click', newGame);
        document.getElementById('btn-pause').addEventListener('click', togglePause);
        document.getElementById('btn-speed-down').addEventListener('click', () => adjustSpeed(-1));
        document.getElementById('btn-speed-up').addEventListener('click', () => adjustSpeed(1));

        // roundRect polyfill for older browsers
        if (!CanvasRenderingContext2D.prototype.roundRect) {
          CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (r > w / 2) r = w / 2;
            if (r > h / 2) r = h / 2;
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
          };
        }

        newGame();
        window.addEventListener('resize', () => { if (!gameOver) resize(); });
      })();
    </script>
  </body>
</html>
