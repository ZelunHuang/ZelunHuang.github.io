<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake - Zelun Huang</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .snake-wrap { max-width:380px; margin:0 auto; user-select:none; -webkit-user-select:none; }
      .snake-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
      .snake-info { display:flex; gap:20px; font-size:0.85rem; color:var(--muted); }
      .snake-info strong { color:var(--text); font-size:1rem; }
      .btn-sm { font-family:var(--font); font-size:0.82rem; padding:3px 12px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface-alt); color:var(--text); cursor:pointer; }
      .btn-sm:hover { border-color:var(--accent); color:var(--accent); }
      .btn-lg { font-family:var(--font); font-size:0.95rem; padding:10px 24px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface-alt); color:var(--text); cursor:pointer; }
      .btn-lg:hover { border-color:var(--accent); color:var(--accent); }

      .board-wrap { position:relative; width:100%; aspect-ratio:1/1; border:1px solid var(--border); border-radius:var(--radius); background:#ebede9; }
      #canvas { display:block; width:100%; height:100%; }

      .snake-bottom { margin-top:10px; }
      .snake-actions { display:flex; align-items:center; gap:14px; }
      .speed-group { display:flex; align-items:center; gap:6px; }
      .speed-label { font-size:0.82rem; color:var(--muted); min-width:72px; text-align:center; }

      .hint { margin-top:8px; font-size:0.82rem; color:var(--muted); line-height:1.6; }
      .hint kbd { font-family:var(--font); padding:1px 6px; border:1px solid var(--border); border-radius:3px; font-size:0.78rem; background:var(--surface-alt); }

      .overlay { position:absolute; inset:0; background:rgba(255,255,255,0.8); display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px; border-radius:var(--radius); z-index:5; }
      .overlay.show { display:flex; }
      .overlay p { margin:0; font-size:1.1rem; font-weight:700; color:var(--text); }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">Zelun Huang</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <div class="dropdown">
            <span class="dropbtn">More ▾</span>
            <div class="dropdown-menu">
              <a href="profile.html">Profile</a>
              <a href="projects.html">Projects</a>
              <a href="hobbies.html">Hobbies</a>
              <a href="https://github.com/ZelunHuang" target="_blank" rel="noreferrer">GitHub</a>
              <a href="social.html">Social Media</a>
              <a class="active" href="fun-game.html">Fun Game</a>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main class="page-shell">
      <section class="container">
        <div class="page-heading">
          <h1>Snake</h1>
          <p>Eat, grow, survive.</p>
        </div>

        <div class="snake-wrap">
          <div class="snake-top">
            <div class="snake-info">
              <span>Score: <strong id="score">0</strong></span>
              <span>Best: <strong id="best">0</strong></span>
            </div>
            <button class="btn-sm" id="btn-new">New Game</button>
          </div>

          <div class="board-wrap">
            <canvas id="canvas"></canvas>
            <div class="overlay" id="overlay"></div>
          </div>

          <div class="snake-bottom">
            <div class="snake-actions">
              <button class="btn-sm" id="btn-pause">Pause</button>
              <div class="speed-group">
                <button class="btn-sm" id="btn-speed-down">&minus;</button>
                <span class="speed-label" id="speed-label">Speed: 3</span>
                <button class="btn-sm" id="btn-speed-up">+</button>
              </div>
            </div>

            <div class="hint">
              <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&larr;</kbd> <kbd>&rarr;</kbd> change direction &nbsp;&middot;&nbsp; <kbd>P</kbd> pause
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Zelun Huang</p>
      </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
      (function () {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const overlay = document.getElementById('overlay');

        const GRID = 16; // 16x16 grid
        let W, H, cellSize;
        let snake, food, dir, nextDir, score, best, gameOver, paused, gameStarted;
        let animId, gameTimer;
        let speedLevel = 2; // default (Speed: 3)

        // 5 speed levels (interval in ms)
        const SPEEDS = [200, 150, 110, 80, 55];

        function resize() {
          const rect = canvas.parentElement.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          const w = rect.width - 2;
          canvas.width = Math.round(w * dpr);
          canvas.height = Math.round(w * dpr);
          canvas.style.width = w + 'px';
          canvas.style.height = w + 'px';
          W = canvas.width;
          H = canvas.height;
          cellSize = W / GRID;
        }

        function spawnFood() {
          const occupied = new Set(snake.map(s => s.x + ',' + s.y));
          let pos;
          do {
            pos = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
          } while (occupied.has(pos.x + ',' + pos.y));
          food = pos;
        }

        function newGame() {
          overlay.classList.remove('show');
          resize();
          score = 0; gameOver = false; paused = false; gameStarted = false;
          scoreEl.textContent = '0';
          document.getElementById('btn-pause').textContent = 'Pause';
          const cx = Math.floor(GRID / 2);
          const cy = Math.floor(GRID / 2);
          snake = [{x: cx, y: cy}, {x: cx-1, y: cy}, {x: cx-2, y: cy}];
          dir = {x: 1, y: 0};
          nextDir = {x: 1, y: 0};
          spawnFood();
          loadBest();
          clearInterval(gameTimer);
          draw();
          showStartOverlay();
        }

        function showStartOverlay() {
          overlay.innerHTML = '<p style="font-size:1.2rem">Snake</p><p style="font-size:0.85rem;color:var(--muted);margin:0">Use arrow keys to steer</p><button class="btn-lg" id="btn-start" style="margin-top:4px">Start</button>';
          overlay.classList.add('show');
          document.getElementById('btn-start').addEventListener('click', startGame);
        }

        function startGame() {
          gameStarted = true;
          overlay.classList.remove('show');
          clearInterval(gameTimer);
          gameTimer = setInterval(tick, SPEEDS[speedLevel]);
        }

        function loadBest() {
          best = parseInt(localStorage.getItem('snake-best') || '0');
          bestEl.textContent = best;
        }
        function saveBest() {
          if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('snake-best', best); }
        }

        function tick() {
          if (paused || gameOver || !gameStarted) return;
          dir = { ...nextDir };

          const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

          // wall collision
          if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
            endGame(); return;
          }

          // self collision
          for (const s of snake) {
            if (s.x === head.x && s.y === head.y) { endGame(); return; }
          }

          snake.unshift(head);

          if (head.x === food.x && head.y === food.y) {
            score++;
            scoreEl.textContent = score;
            spawnFood();
          } else {
            snake.pop();
          }

          draw();
        }

        function endGame() {
          gameOver = true;
          saveBest();
          clearInterval(gameTimer);
          overlay.innerHTML = '<p>Game Over  \u00b7  Score: ' + score + '</p><button class="btn-lg" id="btn-restart-o">Play again</button>';
          overlay.classList.add('show');
          document.getElementById('btn-restart-o').addEventListener('click', newGame);
        }

        function draw() {
          ctx.clearRect(0, 0, W, H);

          // grid lines (subtle)
          ctx.strokeStyle = 'rgba(0,0,0,0.04)';
          ctx.lineWidth = 1;
          for (let i = 0; i <= GRID; i++) {
            ctx.beginPath(); ctx.moveTo(i * cellSize, 0); ctx.lineTo(i * cellSize, H); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i * cellSize); ctx.lineTo(W, i * cellSize); ctx.stroke();
          }

          // snake body
          snake.forEach((s, i) => {
            const x = s.x * cellSize, y = s.y * cellSize;
            ctx.fillStyle = i === 0 ? '#1a7f37' : '#2da44e';
            const m = cellSize * 0.08;
            ctx.beginPath();
            ctx.roundRect(x + m, y + m, cellSize - m*2, cellSize - m*2, cellSize * 0.2);
            ctx.fill();
          });

          // food
          const fx = food.x * cellSize, fy = food.y * cellSize;
          ctx.fillStyle = '#e74c3c';
          ctx.beginPath();
          ctx.arc(fx + cellSize/2, fy + cellSize/2, cellSize * 0.38, 0, Math.PI * 2);
          ctx.fill();
        }

        function togglePause() {
          if (gameOver || !gameStarted) return;
          paused = !paused;
          document.getElementById('btn-pause').textContent = paused ? 'Resume' : 'Pause';
        }

        function adjustSpeed(delta) {
          speedLevel = Math.max(0, Math.min(SPEEDS.length - 1, speedLevel + delta));
          document.getElementById('speed-label').textContent = 'Speed: ' + (speedLevel + 1);
          if (!paused && !gameOver && gameStarted) {
            clearInterval(gameTimer);
            gameTimer = setInterval(tick, SPEEDS[speedLevel]);
          }
        }

        // Keyboard
        document.addEventListener('keydown', (e) => {
          if (e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); return; }
          if (paused || gameOver || !gameStarted) return;
          const map = {
            ArrowUp:    {x: 0, y: -1},
            ArrowDown:  {x: 0, y: 1},
            ArrowLeft:  {x: -1, y: 0},
            ArrowRight: {x: 1, y: 0},
          };
          const d = map[e.key];
          if (!d) return;
          e.preventDefault();
          // prevent 180-degree reversal
          if (dir.x + d.x === 0 && dir.y + d.y === 0) return;
          nextDir = d;
        });

        // Touch swipe
        let tx = null, ty = null;
        const wrap = canvas.parentElement;
        wrap.addEventListener('touchstart', (e) => {
          const t = e.touches[0]; tx = t.clientX; ty = t.clientY;
        }, { passive: true });
        wrap.addEventListener('touchend', (e) => {
          if (tx == null) return;
          const t = e.changedTouches[0];
          const dx = t.clientX - tx, dy = t.clientY - ty;
          const ax = Math.abs(dx), ay = Math.abs(dy);
          if (Math.max(ax, ay) < 20) return;
          let d;
          if (ax > ay) d = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
          else d = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
          if (dir.x + d.x === 0 && dir.y + d.y === 0) return;
          nextDir = d;
          tx = ty = null;
        }, { passive: true });

        // Wire buttons
        document.getElementById('btn-new').addEventListener('click', newGame);
        document.getElementById('btn-pause').addEventListener('click', togglePause);
        document.getElementById('btn-speed-down').addEventListener('click', () => adjustSpeed(-1));
        document.getElementById('btn-speed-up').addEventListener('click', () => adjustSpeed(1));

        // roundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
          CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (r > w/2) r = w/2; if (r > h/2) r = h/2;
            this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r);
          };
        }

        newGame();
        window.addEventListener('resize', () => { if (!gameOver && !paused) resize(); });
      })();
    </script>
  </body>
</html>
